<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>City Current Status</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  :root {
    --green: #12B76A;
    --red: #F04438;
    --blue-light: #EEF4FF;
    --gray: #667085;
    --gray-light: #EAECF0;
    --dark: #101828;
    --row-alt: #F9FAFB;
    --bg: #FFFFFF;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--dark);
    margin: 24px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 14px;
  }

  .title {
    font-size: 30px;
    font-weight: 800;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--gray);
    font-size: 14px;
    margin-top: 4px;
  }

  .note {
    color: var(--gray);
    font-size: 12px;
    text-align: right;
    max-width: 700px;
    line-height: 1.4;
    padding-top: 4px;
  }

  .table-wrapper {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 13px;
    min-width: 1500px;
  }

  thead tr.group-header th {
    border-bottom: 2px solid var(--gray-light);
    font-size: 14px;
    padding: 8px 4px 4px 4px;
    text-align: center;
    font-weight: 800;
  }

  thead tr.sub-header th {
    color: var(--gray);
    font-size: 12px;
    padding: 4px;
    border-bottom: 2px solid var(--gray-light);
    text-align: center;
    font-weight: 700;
  }

  tbody td {
    padding: 7px 6px;
    border-bottom: 1px solid var(--gray-light);
    text-align: center;
    white-space: nowrap;
  }

  tbody tr:nth-child(even) {
    background: var(--row-alt);
  }

  tbody tr {
  transition: background-color 0.15s ease, box-shadow 0.15s ease;
}

tbody tr:hover {
  background: #FFF7E6 !important;
  box-shadow: inset 4px 0 0 #F79009;
  cursor: pointer;
}

  .city {
    text-align: left;
    font-weight: 500;
    width: 180px;
  }

  .today {
    font-weight: 800;
  }

  .delta {
    font-weight: 800;
  }

  .good {
    color: var(--green);
  }

  .bad {
    color: var(--red);
  }

  .neutral {
    color: var(--gray);
  }

  .total-row {
    background: var(--blue-light) !important;
    font-weight: 800;
  }

  .footer {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    color: var(--gray);
    font-size: 12px;
    gap: 20px;
  }

  .error {
    color: var(--red);
    font-weight: 700;
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #FDA29B;
    background: #FEF3F2;
    border-radius: 8px;
  }

  .loading {
    color: var(--gray);
    font-weight: 700;
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="header">
  <div>
    <div class="title" id="title">City Current Status</div>
    <div class="subtitle" id="subtitle">Loading data...</div>
  </div>

  <div class="note">
    OR = serving / online &nbsp; | &nbsp;
    OV60 = Ov60 orders / completed orders &nbsp; | &nbsp;
    OR, OV60 and CETA lower is better
  </div>
</div>

<div id="dashboard" class="table-wrapper">
  <div class="loading">Loading dashboard...</div>
</div>

<div class="footer">
  <div id="footer-left"></div>
  <div>Green = favorable direction | Red = unfavorable direction</div>
</div>

<script>
  // ============================================================
  // CONFIG
  // ============================================================

  const SERVER_PUBLIC_BASE = "https://img0.didiglobal.com/static/soda_public/";
  const TOP_N = 25;
  const MIN_ONLINE_CURRENT = 5;

  // ============================================================
  // URL PARAMS
  // ============================================================

  function getDataUrl() {
    const params = new URLSearchParams(window.location.search);

    // Option A:
    // dashboard/?file=a0b1c2d3
    const fileToken = params.get("file");

    if (fileToken) {
      return SERVER_PUBLIC_BASE + encodeURIComponent(fileToken);
    }

    // Option B:
    // dashboard/?url=https%3A%2F%2Fwww.miserver.com%2Fpublic%2Fa0b1c2d3
    const fullUrl = params.get("url");

    if (fullUrl) {
      return fullUrl;
    }

    return null;
  }

  // ============================================================
  // FORMATTERS
  // ============================================================

  function toNumber(value) {
    if (value === undefined || value === null || value === "" || value === "NA") {
      return NaN;
    }

    return Number(String(value).replace(/,/g, "").replace("%", "").trim());
  }

  function fmtNum(x) {
    if (!Number.isFinite(x)) return "NA";
    return Math.round(x).toLocaleString("en-US");
  }

  function fmtPctRatio(x) {
    if (!Number.isFinite(x)) return "NA";
    return `${(x * 100).toFixed(1)}%`;
  }

  function fmtPctDelta(x) {
    if (!Number.isFinite(x)) return "NA";
    return `${x >= 0 ? "+" : ""}${x.toFixed(1)}%`;
  }

  function fmtPp(x) {
    if (!Number.isFinite(x)) return "NA";
    return `${x >= 0 ? "+" : ""}${x.toFixed(1)} pp`;
  }

  function fmtMin(x) {
    if (!Number.isFinite(x)) return "NA";
    return `${x.toFixed(1)}m`;
  }

  function fmtMinDelta(x) {
    if (!Number.isFinite(x)) return "NA";
    return `${x >= 0 ? "+" : ""}${x.toFixed(1)}m`;
  }

  function deltaClass(value, positiveGood = true) {
    if (!Number.isFinite(value)) return "neutral";

    if (positiveGood) {
      return value >= 0 ? "good" : "bad";
    }

    return value <= 0 ? "good" : "bad";
  }

  function formatDateLabel(dateString) {
    const date = new Date(dateString + "T00:00:00");
    return `${date.getMonth() + 1}/${date.getDate()}`;
  }

  function formatCutoffMexico() {
    const now = new Date();

    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/Mexico_City",
      month: "short",
      day: "2-digit",
      hour: "2-digit",
      hour12: false
    }).formatToParts(now);

    const month = parts.find(p => p.type === "month")?.value ?? "";
    const day = parts.find(p => p.type === "day")?.value ?? "";
    const hour = parts.find(p => p.type === "hour")?.value ?? "";

    return `${month}-${day} ${hour}hrs`;
  }

  function getCutoffLabelFromRows(rows) {
    const rowWithCutoff = rows.find(row =>
        row.cutoff_mx_label &&
        String(row.cutoff_mx_label).trim() !== ""
    );

    if (rowWithCutoff) {
        return String(rowWithCutoff.cutoff_mx_label).trim();
    }

    const params = new URLSearchParams(window.location.search);
    const cutoffFromUrl = params.get("cutoff");

    if (cutoffFromUrl) {
        return cutoffFromUrl;
    }

    return "Unknown cutoff";
    }

  // ============================================================
  // DATA PROCESSING
  // ============================================================

  function cleanRows(rows) {
    return rows
      .filter(row => row.fecha && row.city_name && row.cityId)
      .map(row => {
        const ov60Col = row.over60min_orders_num !== undefined
          ? "over60min_orders_num"
          : "ov60min_orders_num";

        return {
          city_name: String(row.city_name).replace("RÃ­o", "Río"),
          cityId: String(row.cityId),
          fecha: String(row.fecha).slice(0, 10),

          serving_couriers_num: toNumber(row.serving_couriers_num),
          online_couriers_num: toNumber(row.online_couriers_num),
          over60min_orders_num: toNumber(row[ov60Col]),
          avg_ceta_time: toNumber(row.avg_ceta_time),
          paid_orders_num: toNumber(row.paid_orders_num),
          completed_orders_num: toNumber(row.completed_orders_num),
          countryId: row.countryId ?? "",

          cutoff_mx_label: row.cutoff_mx_label ?? "",
          cutoff_mx_datetime: row.cutoff_mx_datetime ?? ""
        };
      });
  }

  function uniqueSortedDates(rows) {
    return [...new Set(rows.map(r => r.fecha))]
      .filter(Boolean)
      .sort();
  }

  function groupByCity(rows) {
    const map = new Map();

    rows.forEach(row => {
      const key = `${row.cityId}||${row.city_name}`;

      if (!map.has(key)) {
        map.set(key, {
          cityId: row.cityId,
          city_name: row.city_name,
          byDate: {}
        });
      }

      map.get(key).byDate[row.fecha] = row;
    });

    return [...map.values()];
  }

  function safeDiv(a, b) {
    return Number.isFinite(a) && Number.isFinite(b) && b !== 0 ? a / b : NaN;
  }

  function buildCityMetric(city, currentDate, lastWeekDate) {
    const cur = city.byDate[currentDate];
    const lw = city.byDate[lastWeekDate];

    if (!cur || !lw) return null;

    const paidCurrent = cur.paid_orders_num;
    const paidLastWeek = lw.paid_orders_num;

    const onlineCurrent = cur.online_couriers_num;
    const onlineLastWeek = lw.online_couriers_num;

    const orCurrent = safeDiv(cur.serving_couriers_num, cur.online_couriers_num);
    const orLastWeek = safeDiv(lw.serving_couriers_num, lw.online_couriers_num);

    const ov60Current = safeDiv(cur.over60min_orders_num, cur.completed_orders_num);
    const ov60LastWeek = safeDiv(lw.over60min_orders_num, lw.completed_orders_num);

    const cetaCurrent = cur.avg_ceta_time;
    const cetaLastWeek = lw.avg_ceta_time;

    return {
      cityId: city.cityId,
      city_name: city.city_name,

      paid_current: paidCurrent,
      paid_last_week: paidLastWeek,
      paid_var_pct: Number.isFinite(paidLastWeek) && paidLastWeek > 0
        ? ((paidCurrent / paidLastWeek) - 1) * 100
        : NaN,

      online_current: onlineCurrent,
      online_last_week: onlineLastWeek,
      online_var_pct: Number.isFinite(onlineLastWeek) && onlineLastWeek > 0
        ? ((onlineCurrent / onlineLastWeek) - 1) * 100
        : NaN,

      OR_current: orCurrent,
      OR_last_week: orLastWeek,
      OR_var_pp: Number.isFinite(orCurrent) && Number.isFinite(orLastWeek)
        ? (orCurrent - orLastWeek) * 100
        : NaN,

      OV60_current: ov60Current,
      OV60_last_week: ov60LastWeek,
      OV60_var_pp: Number.isFinite(ov60Current) && Number.isFinite(ov60LastWeek)
        ? (ov60Current - ov60LastWeek) * 100
        : NaN,

      CETA_current: cetaCurrent,
      CETA_last_week: cetaLastWeek,
      CETA_var_min: Number.isFinite(cetaCurrent) && Number.isFinite(cetaLastWeek)
        ? cetaCurrent - cetaLastWeek
        : NaN
    };
  }

  function buildMxTotal(rows, currentDate, lastWeekDate) {
    const curRows = rows.filter(r => r.fecha === currentDate);
    const lwRows = rows.filter(r => r.fecha === lastWeekDate);

    const sum = (arr, col) => arr.reduce((acc, r) => acc + (Number.isFinite(r[col]) ? r[col] : 0), 0);

    const paidCurrent = sum(curRows, "paid_orders_num");
    const paidLastWeek = sum(lwRows, "paid_orders_num");

    const onlineCurrent = sum(curRows, "online_couriers_num");
    const onlineLastWeek = sum(lwRows, "online_couriers_num");

    const servingCurrent = sum(curRows, "serving_couriers_num");
    const servingLastWeek = sum(lwRows, "serving_couriers_num");

    const completedCurrent = sum(curRows, "completed_orders_num");
    const completedLastWeek = sum(lwRows, "completed_orders_num");

    const ov60CurrentOrders = sum(curRows, "over60min_orders_num");
    const ov60LastWeekOrders = sum(lwRows, "over60min_orders_num");

    const orCurrent = safeDiv(servingCurrent, onlineCurrent);
    const orLastWeek = safeDiv(servingLastWeek, onlineLastWeek);

    const ov60Current = safeDiv(ov60CurrentOrders, completedCurrent);
    const ov60LastWeek = safeDiv(ov60LastWeekOrders, completedLastWeek);

    const cetaCurrentNum = curRows.reduce((acc, r) => {
      if (Number.isFinite(r.avg_ceta_time) && Number.isFinite(r.completed_orders_num)) {
        return acc + r.avg_ceta_time * r.completed_orders_num;
      }
      return acc;
    }, 0);

    const cetaLastWeekNum = lwRows.reduce((acc, r) => {
      if (Number.isFinite(r.avg_ceta_time) && Number.isFinite(r.completed_orders_num)) {
        return acc + r.avg_ceta_time * r.completed_orders_num;
      }
      return acc;
    }, 0);

    const cetaCurrent = completedCurrent > 0 ? cetaCurrentNum / completedCurrent : NaN;
    const cetaLastWeek = completedLastWeek > 0 ? cetaLastWeekNum / completedLastWeek : NaN;

    return {
      cityId: "MX_TOTAL",
      city_name: "MX Total",

      paid_current: paidCurrent,
      paid_last_week: paidLastWeek,
      paid_var_pct: paidLastWeek > 0 ? ((paidCurrent / paidLastWeek) - 1) * 100 : NaN,

      online_current: onlineCurrent,
      online_last_week: onlineLastWeek,
      online_var_pct: onlineLastWeek > 0 ? ((onlineCurrent / onlineLastWeek) - 1) * 100 : NaN,

      OR_current: orCurrent,
      OR_last_week: orLastWeek,
      OR_var_pp: Number.isFinite(orCurrent) && Number.isFinite(orLastWeek)
        ? (orCurrent - orLastWeek) * 100
        : NaN,

      OV60_current: ov60Current,
      OV60_last_week: ov60LastWeek,
      OV60_var_pp: Number.isFinite(ov60Current) && Number.isFinite(ov60LastWeek)
        ? (ov60Current - ov60LastWeek) * 100
        : NaN,

      CETA_current: cetaCurrent,
      CETA_last_week: cetaLastWeek,
      CETA_var_min: Number.isFinite(cetaCurrent) && Number.isFinite(cetaLastWeek)
        ? cetaCurrent - cetaLastWeek
        : NaN
    };
  }

  function buildScorecard(rows) {
    const dates = uniqueSortedDates(rows);

    if (dates.length < 2) {
      throw new Error("CSV must contain at least two dates.");
    }

    const currentDate = dates[dates.length - 1];
    const lastWeekDate = dates[dates.length - 2];

    const grouped = groupByCity(rows);

    const cityMetrics = grouped
      .map(city => buildCityMetric(city, currentDate, lastWeekDate))
      .filter(Boolean)
      .filter(row => Number.isFinite(row.online_current) && row.online_current >= MIN_ONLINE_CURRENT)
      .sort((a, b) => b.paid_current - a.paid_current)
      .slice(0, TOP_N);

    const total = buildMxTotal(rows, currentDate, lastWeekDate);

    return {
        currentDate,
        lastWeekDate,
        cutoffLabel: getCutoffLabelFromRows(rows),
        rows: [total, ...cityMetrics]
    };
  }

  // ============================================================
  // RENDER
  // ============================================================

  function renderTable(scorecard) {
    const rows = scorecard.rows;

    const htmlRows = rows.map(row => {
      const isTotal = row.city_name === "MX Total";

      return `
        <tr class="${isTotal ? "total-row" : ""}">
          <td class="city">${row.city_name}</td>

          <td>${fmtNum(row.paid_last_week)}</td>
          <td class="today">${fmtNum(row.paid_current)}</td>
          <td class="delta ${deltaClass(row.paid_var_pct, true)}">${fmtPctDelta(row.paid_var_pct)}</td>

          <td>${fmtNum(row.online_last_week)}</td>
          <td class="today">${fmtNum(row.online_current)}</td>
          <td class="delta ${deltaClass(row.online_var_pct, true)}">${fmtPctDelta(row.online_var_pct)}</td>

          <td>${fmtPctRatio(row.OR_last_week)}</td>
          <td class="today">${fmtPctRatio(row.OR_current)}</td>
          <td class="delta ${deltaClass(row.OR_var_pp, false)}">${fmtPp(row.OR_var_pp)}</td>

          <td>${fmtPctRatio(row.OV60_last_week)}</td>
          <td class="today">${fmtPctRatio(row.OV60_current)}</td>
          <td class="delta ${deltaClass(row.OV60_var_pp, false)}">${fmtPp(row.OV60_var_pp)}</td>

          <td>${fmtMin(row.CETA_last_week)}</td>
          <td class="today">${fmtMin(row.CETA_current)}</td>
          <td class="delta ${deltaClass(row.CETA_var_min, false)}">${fmtMinDelta(row.CETA_var_min)}</td>
        </tr>
      `;
    }).join("");

    const table = `
      <table>
        <thead>
          <tr class="group-header">
            <th rowspan="2" style="text-align:left;">City</th>
            <th colspan="3">Paid Orders Accum</th>
            <th colspan="3">Current Online Couriers</th>
            <th colspan="3">Current Occupancy Rate</th>
            <th colspan="3">Ov60 Accum</th>
            <th colspan="3">Current CETA</th>
          </tr>
          <tr class="sub-header">
            <th>LW</th>
            <th>Today</th>
            <th>Δ</th>

            <th>LW</th>
            <th>Today</th>
            <th>Δ</th>

            <th>LW</th>
            <th>Today</th>
            <th>Δ</th>

            <th>LW</th>
            <th>Today</th>
            <th>Δ</th>

            <th>LW</th>
            <th>Today</th>
            <th>Δ</th>
          </tr>
        </thead>
        <tbody>
          ${htmlRows}
        </tbody>
      </table>
    `;

    document.getElementById("dashboard").innerHTML = table;

    const currentLabel = formatDateLabel(scorecard.currentDate);
    const lastWeekLabel = formatDateLabel(scorecard.lastWeekDate);
    const cutoffLabel = scorecard.cutoffLabel;

    document.getElementById("title").textContent = `City Current Status | Cutoff MX: ${cutoffLabel}`;
    document.getElementById("subtitle").textContent =
      `Weekly city comparison — Last Week (${lastWeekLabel}) vs Today (${currentLabel})`;

    document.getElementById("footer-left").textContent =
      `MX Total includes all cities. Top ${TOP_N} city rows ranked by Paid Orders Today.`;
  }

  function renderError(message) {
    document.getElementById("subtitle").textContent = "Error loading dashboard.";
    document.getElementById("dashboard").innerHTML = `<div class="error">${message}</div>`;
  }

  // ============================================================
  // MAIN
  // ============================================================

  async function main() {
    const dataUrl = getDataUrl();

    if (!dataUrl) {
      renderError("Missing parameter. Use: index.html?file=a0b1c2d3");
      return;
    }

    try {
      document.getElementById("subtitle").textContent = `Loading CSV...`;

      const response = await fetch(dataUrl, { cache: "no-store" });

      if (!response.ok) {
        throw new Error(`Could not fetch CSV. HTTP status: ${response.status}`);
      }

      const csvText = await response.text();

      const parsed = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        dynamicTyping: false
      });

      if (parsed.errors && parsed.errors.length > 0) {
        console.warn("CSV parse warnings:", parsed.errors);
      }

      const clean = cleanRows(parsed.data);
      const scorecard = buildScorecard(clean);

      renderTable(scorecard);

    } catch (error) {
      console.error(error);
      renderError(error.message);
    }
  }

  main();
</script>

</body>
</html>
